<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" role="img" aria-label="RepCore apple icon">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1a1a22"/>
      <stop offset="1" stop-color="#0a0a0e"/>
    </linearGradient>
    <linearGradient id="metalR" x1="50" y1="42" x2="140" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.4" stop-color="#d0d8e8"/>
      <stop offset="1" stop-color="#8a9ab8"/>
    </linearGradient>
    <linearGradient id="barBlue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <pattern id="texture" x="0" y="0" width="4" height="4" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="rgba(255,255,255,0.025)"/>
      <circle cx="3" cy="3" r="0.6" fill="rgba(255,255,255,0.015)"/>
    </pattern>
  </defs>
  <rect width="180" height="180" rx="40" fill="url(#bgGrad)"/>
  <rect width="180" height="180" rx="40" fill="url(#texture)"/>
  <radialGradient id="vig" cx="50%" cy="40%" r="65%">
    <stop offset="0" stop-color="rgba(255,255,255,0.04)"/>
    <stop offset="1" stop-color="rgba(0,0,0,0.35)"/>
  </radialGradient>
  <rect width="180" height="180" rx="40" fill="url(#vig)"/>
  <g filter="url(#shadow)">
    <rect x="50" y="42" width="21" height="96" rx="3" fill="url(#metalR)"/>
    <rect x="50" y="42" width="62" height="19" rx="3" fill="url(#metalR)"/>
    <rect x="91" y="42" width="21" height="52" rx="3" fill="url(#metalR)"/>
    <rect x="50" y="79" width="62" height="19" rx="3" fill="url(#metalR)"/>
    <polygon points="71,98 112,98 132,138 108,138" fill="url(#metalR)"/>
    <rect x="71" y="61" width="40" height="18" rx="3" fill="#0f0f18"/>
  </g>
  <g>
    <rect x="53" y="110" width="8" height="20" rx="2" fill="url(#barBlue)" opacity="0.92"/>
    <rect x="64" y="104" width="8" height="26" rx="2" fill="url(#barBlue)" opacity="0.96"/>
    <rect x="75" y="96" width="8" height="34" rx="2" fill="#3b82f6"/>
  </g>
  <ellipse cx="70" cy="133" rx="18" ry="3" fill="#2563eb" opacity="0.18"/>
