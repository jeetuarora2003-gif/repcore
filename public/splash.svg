<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="RepCore">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#2a2d35"/>
      <stop offset="1" stop-color="#16181d"/>
    </linearGradient>
    <radialGradient id="vignette" cx="256" cy="210" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3a3d45" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#0e1014" stop-opacity="0.9"/>
    </radialGradient>
    <linearGradient id="metalR" x1="100" y1="80" x2="410" y2="410" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.3" stop-color="#e0e6f0"/>
      <stop offset="0.65" stop-color="#b0bac8"/>
      <stop offset="1" stop-color="#707a8a"/>
    </linearGradient>
    <linearGradient id="barG1" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#5ab4f0"/><stop offset="1" stop-color="#1a5fd4"/>
    </linearGradient>
    <linearGradient id="barG2" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0" stop-color="#4aaee8"/><stop offset="1" stop-color="#1857c8"/>
    </linearGradient>
