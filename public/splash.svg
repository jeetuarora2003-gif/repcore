      <stop offset="0" stop-color="#3aa0de"/><stop offset="1" stop-color="#1650be"/>
    </linearGradient>
    <filter id="rShadow"><feDropShadow dx="3" dy="5" stdDeviation="9" flood-color="#000" flood-opacity="0.55"/></filter>
    <filter id="barGlow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="512" height="512" fill="url(#bgGrad)"/>
